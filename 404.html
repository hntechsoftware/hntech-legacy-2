<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>ERROR 404</title>
  
  </head>
  <style>
  /* Global reset to keep it raw */
  body {
    background-color: #ffffff;
    color: #000000;
    margin: 0;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* Brutalist Header */
  h1 {
    font-family: "Courier New", Courier, monospace;
    font-size: 3rem;
    text-transform: uppercase;
    letter-spacing: -2px;
    border: 4px solid #000;
    padding: 10px 20px;
    margin-bottom: 20px;
    background: #000;
    color: #fff;
  }

  /* Brutalist Paragraph/p1 */
  p {
    font-family: "Courier New", Courier, monospace;
    font-size: 1.2rem;
    font-weight: bold;
    max-width: 600px;
    text-align: center;
    line-height: 1.4;
  }

  /* Link Styling */
  a {
    color: #000;
    text-decoration: none;
    border-bottom: 3px solid #000;
    padding-bottom: 2px;
  }

  a:hover {
    background: #000;
    color: #fff;
  }
</style>
  <body>
    <main>
      <br><br><br>
      <div style="text-align:center;">
        <h1>404: Page Not Found Error.</h1>
        <p1>The page you're looking for doesn't exist on the HNTech site.</p1><br>
        <a href="https://hntechsoftware.github.io"><p1>Go to Homepage</p1></a>
      </div>
    </main>
  </body>
</html>
